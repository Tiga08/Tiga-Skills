# README 技能清单的权威元数据源，固定放在项目根目录。
# 每个 skill 必须提供 <name>.description。
# description 概述核心功能与适用场景，并列出简洁用法和全部用户调用参数；无固定参数时说明所需输入。
# skill 核心功能、调用方式或参数变化时，必须同步更新对应字段。

manage-global-skills.description=管理 Tiga-Skills 全局技能注册表，支持配置用户级链接（`setup`）、注册外部 skill（`add <path> [--name <name>]`）、注册自定义 skill（`add-custom <name>`）、移除（`remove <name>`）、列出（`list`）、检查（`check`）及刷新 README（`update-readme`）；中文说明来自根目录 descriptions-zh.conf。

tiga-check-docs.description=对照仓库实际状态审计 README.md、CLAUDE.md、AGENTS.md 与 docs/，报告失效路径、遗漏内容、过期引用和文档矛盾；不传参数时扫描全部治理文档，支持重复指定 `--scope <file>` 限定范围、`--fix` 交互修复并同步治理文件译文、`--verbose` 显示通过项。
tiga-commit-pr.description=分析当前 Git 改动或已有分支提交，按必选模式 `switch`、`commit`、`pr` 准备分支、Conventional Commit、推送和 PR 流程；默认仅打印安全命令，传入 `--execute` 时按顺序执行，同时保留工作区文件和已有暂存状态。
tiga-gen-governance.description=根据真实仓库结构生成或重建 AGENTS.md 与 CLAUDE.md，合并仍有效的旧规则并同步简体中文版本；不传参数时处理当前项目，支持 `--dry-run` 仅输出计划、`--force` 无提示覆盖冲突文件、`--no-translate` 跳过译文同步。
tiga-local-skills.description=管理当前项目 `.agents/skills/` 中供 Claude Code 与 Codex 共享的项目级 skills；支持 `init`、`add <path> [--name <name>] [--link]`（默认复制，`--link` 改为符号链接）、`update [<name>] [<path>]`（省略名称时批量更新）、`remove <name>` 和 `list`。
tiga-translate.description=将一个或多个 Markdown 文件或目录路径翻译为简体中文，保留逐行结构并增量更新；调用格式为 `<path>... [--force] [--output <dir>] [--glossary <file>]`，分别用于强制全文重译、指定非治理文件输出目录和指定术语表；治理文件输出相邻 `.zh.md`。

baoyu-format-markdown.description=将 `<file>` 的纯文本或 Markdown 优化为带 frontmatter、标题、摘要、层级、列表和代码块的 `{filename}-formatted.md`，也可选择保留原结构或仅原地修正排版；排版参数包括 `--quotes`/`-q`、`--no-quotes`、`--spacing`/`-s`、`--no-spacing`、`--emphasis`/`-e`、`--no-emphasis`。
baoyu-url-to-markdown.description=通过 Chrome 抓取 `<url>` 并用 X、YouTube、Hacker News 或通用适配器转换为 Markdown/JSON；支持 `--output <path>`、`--format markdown/json`/`--json`、`--adapter x/youtube/hn/generic`、`--headless`、`--wait-for none/interaction/force`（别名 `--wait-for-interaction`、`--wait-for-login`）、`--timeout <ms>`、`--interaction-timeout <ms>`、`--interaction-poll-interval <ms>`、`--download-media`、`--media-dir <dir>`、`--cdp-url <url>`、`--browser-path <path>`、`--chrome-profile-dir <path>`、`--debug-dir <dir>`。

security-scan.description=使用 AgentShield 扫描 `.claude/` 中的 CLAUDE.md、settings.json、MCP、hooks 和 agent 定义，或用 `init` 初始化安全配置；`scan [<path>]` 支持 `--path <path>`、`--min-severity <level>`、`--format json/markdown/html`、`--fix`，深度分析可组合 `--opus` 与 `--stream`。
skill-scout.description=在创建、复刻或扩展 skill 前搜索并审查本地、marketplace、GitHub 和 Web 候选；无固定命令参数，调用时提供目标任务、触发条件、涉及领域/工具/框架/数据源及 3–5 个关键词或同义词，也可明确要求跳过搜索或从零创建。
skill-stocktake.description=按统一质量清单审查全局及当前项目的 Claude skills 和 commands；运行 `/skill-stocktake` 时依据 `results.json` 自动执行 Quick Scan（无缓存则完整盘点），传入唯一可选位置参数 `full`（`/skill-stocktake full`）可强制 Full Stocktake，当前工作目录决定项目级扫描范围。
